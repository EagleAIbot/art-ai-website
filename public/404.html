<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Shift AI Tech</title>
    <script>
      (function () {
        var base = '/shiftai/'
        var l = window.location
        var path = l.pathname.startsWith(base) ? l.pathname.slice(base.length) : l.pathname.slice(1)
        var redirect = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          base + '?/' + path.replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') + l.hash
        l.replace(redirect)
      })()
    </script>
  </head>
  <body></body>
</html>
