<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Shift AI Tech</title>
    <script>
      (function () {
        var l = window.location
        var redirect = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          '/?p=' + encodeURIComponent(l.pathname) + l.hash
        l.replace(redirect)
      })()
    </script>
  </head>
  <body></body>
</html>
