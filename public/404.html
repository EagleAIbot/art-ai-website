<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Shift AI Tech</title>
    <script>
      // Redirect unknown GitHub Pages routes to index, preserving the path.
      (function () {
        var l = window.location
        var redirect = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          '/?/' + l.pathname.slice(1).replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') + l.hash
        l.replace(redirect)
      })()
    </script>
  </head>
  <body></body>
</html>
